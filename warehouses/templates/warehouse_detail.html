{% extends "products/base.html" %}

{% block content %}
<style>
    .container {
        max-width: 1100px;
        margin: 40px auto;
        padding: 0 20px;
    }

    .title {
        font-size: 34px;
        font-weight: 700;
        margin-bottom: 24px;
    }

    .search-form {
        margin-bottom: 24px;
    }

    .search-box {
        display: flex;
        align-items: center;
        background: white;
        border-radius: 14px;
        border: 1px solid #ddd;
        padding: 6px 10px;
        max-width: 420px;
        transition: 0.2s;
    }

    .search-box:focus-within {
        border-color: #417690;
        box-shadow: 0 0 0 2px rgba(65, 118, 144, 0.15);
    }

    .search-icon {
        margin-right: 8px;
        color: #888;
        font-size: 15px;
    }

    .search-input {
        border: none;
        outline: none;
        font-size: 15px;
        width: 100%;
        background: transparent;
    }

    .search-btn {
        background: #417690;
        color: white;
        border: none;
        padding: 10px 16px;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.2s;
        font-size: 14px;
        font-weight: 600;
    }

    .search-btn:hover {
        background: #2b5063;
    }

    .products-list {
        display: flex;
        flex-direction: column;
        gap: 14px;
    }

    .card {
        background: white;
        border-radius: 18px;
        padding: 20px 24px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
        transition: 0.2s;
        border: 1px solid #f0f0f0;
    }

    .card:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 34px rgba(0, 0, 0, 0.10);
    }

    .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 20px;
    }

    .product-link {
        font-size: 20px;
        font-weight: 600;
        color: #2f2f2f;
        text-decoration: none;
        transition: 0.2s;
    }

    .product-link:hover {
        color: #417690;
    }

    .qty {
        font-weight: 700;
        font-size: 16px;
        padding: 8px 14px;
        border-radius: 20px;
        background: #e6f7ec;
        color: #2e7d32;
        min-width: 80px;
        text-align: center;
    }

    .qty.zero {
        background: #ffecec;
        color: #c0392b;
    }

    .empty {
        margin-top: 30px;
        font-size: 18px;
        color: #777;
        text-align: center;
        background: white;
        padding: 30px;
        border-radius: 18px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
    }
</style>

<div class="container">
    <div class="title">Склад: {{ warehouse.name }}</div>

    <form method="get" class="search-form">
        <div class="search-box">
            <span class="search-icon">🔍</span>
            <input
                type="text"
                name="q"
                value="{{ request.GET.q }}"
                placeholder="Поиск по товарам..."
                class="search-input"
            >
            <button type="submit" class="search-btn">Найти</button>
        </div>
    </form>

    {% if inventory %}
        <div class="products-list">
            {% for item in inventory %}
                <div class="card">
                    <div class="row">
                        <div>
                            <a href="{% url 'products:product_detail' item.product.pk %}" class="product-link">
                                {{ item.product.name }}
                            </a>
                        </div>
                        <div class="qty {% if item.quantity == 0 %}zero{% endif %}">
                            {{ item.quantity }} шт.
                        </div>
                    </div>
                </div>
            {% endfor %}
        </div>
    {% else %}
        <div class="empty">На складе нет товаров</div>
    {% endif %}
</div>
{% endblock %}
