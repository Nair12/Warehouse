name: Trigger auto deployment for warehouse

on:
  push:
    branches:
      - master

  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.WAREHOUSE_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.WAREHOUSE_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.WAREHOUSE_AZURE_SUBSCRIPTION_ID }}

      - name: Build and Deploy
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          dockerfilePath: Dockerfile

          imageToBuild: warehouseacr2026.azurecr.io/warehouse:${{ github.sha }}

          containerAppName: warehouse
          resourceGroup: Warehouse

          registryUrl: warehouseacr2026.azurecr.io
          registryUsername: ${{ secrets.WAREHOUSE_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.WAREHOUSE_REGISTRY_PASSWORD }}
