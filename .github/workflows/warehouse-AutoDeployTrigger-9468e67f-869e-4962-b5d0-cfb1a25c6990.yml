name: Trigger auto deployment for warehouse

on:
  push:
    branches: 
      - main
      - master
    paths:
      - '**'

  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write
      contents: read

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.WAREHOUSE_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.WAREHOUSE_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.WAREHOUSE_AZURE_SUBSCRIPTION_ID }}

      - name: Build and Deploy using Azure CLI
        run: |
          az extension add --name containerapp --upgrade
          
          # Включаем провайдер реестра контейнеров для твоей подписки Azure
          az provider register --namespace Microsoft.ContainerRegistry
          
          # Запускаем автоматическую сборку и деплой проекта
          az containerapp up \
            --name warehouse \
            --resource-group Warehouse \
            --source .
