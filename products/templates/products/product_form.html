{% extends "base_manager.html" %}
{% load i18n %}

{% block manager_content %}
<h1>{% trans "Добавить продукт" %}</h1>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit" class="btn-save">
        {% trans "Сохранить" %}
    </button>
</form>
{% endblock %}
