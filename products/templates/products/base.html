<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Мой Склад{% endblock %}</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7f9;
            color: #333;
        }

        /* Главный хедер */
        .main-header {
            background: #417690;
            color: white;
            padding: 0 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Навигация */
        .nav-menu {
            display: flex;
            gap: 20px;
        }

        .nav-menu a {
            color: #e0e0e0;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        .nav-menu a:hover {
            color: white;
        }

        /* Блок пользователя */
        .user-block {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 14px;
        }

        .user-name {
            background: rgba(255,255,255,0.1);
            padding: 5px 12px;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .logout-btn {
            color: #ff9a9a;
            text-decoration: none;
            font-weight: bold;
        }

        .logout-btn:hover {
            text-decoration: underline;
        }

        /* Контейнер для контента */
        .main-container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="logo">Мой Склад</div>

        <nav class="nav-menu">
            <a href="{% url 'products:product_list' %}">Товары</a>


        </nav>

      <div class="user-block">
    {% if user.is_authenticated %}
        <a href="/redirect-by-role/" class="user-name">
            👤 {{ user.username }}
        </a>

        <form action="{% url 'logout' %}" method="post" style="display:inline;">
            {% csrf_token %}
            <button type="submit" class="logout-btn" style="background:none; border:none; cursor:pointer; font-family: inherit;">
                Выйти
            </button>
        </form>
    {% else %}
        <a href="{% url 'login' %}" style="color: white; text-decoration: none;">Войти</a>
    {% endif %}
</div>
    </header>

    <main class="main-container">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
