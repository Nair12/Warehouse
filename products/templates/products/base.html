{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Мой Склад{% endblock %}</title>
    <link rel="icon" href="{% static 'images/favicon.ico' %}">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7f9;
            color: #333;
        }

        /* Главный хедер */
        .main-header {
            background: #417690;
            color: white;
            padding: 0 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Навигация */
        .nav-menu {
            display: flex;
            gap: 20px;
        }

        .nav-menu a {
            color: #e0e0e0;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        .nav-menu a:hover {
            color: white;
        }

        /* Блок пользователя */
        .user-block {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 14px;
        }

        .user-name {
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 12px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .logout-btn {
            color: #ff9a9a;
            text-decoration: none;
            font-weight: bold;
        }

        .logout-btn:hover {
            text-decoration: underline;
        }

        /* Контейнер для контента */
        .main-container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* бренд-блок */
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* логотип */
        .logo-img {
            width: 36px;
            height: 36px;
            object-fit: cover;
            border-radius: 8px;

            padding: 4px;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.15);
            transition: 0.3s;
        }

        /* эффект при наведении */
        .logo-img:hover {
            transform: scale(1.1) rotate(5deg);
        }

        /* текст */
        .logo-text {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #ffffff, #dceeff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: 0.3s;
        }


        .logo-text:hover {
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<header class="main-header">
    <div class="logo">
        Warehouse
    </div>

   <nav class="nav-menu">
    <a href="{% url 'products:product_list' %}">Товары</a>
    <a href="{% url 'products:warehouse_reader_list'%}">Склады</a>
</nav>

    <div class="user-block">
        {% if user.is_authenticated %}
        <a href="/redirect-by-role/" class="user-name">
            👤 {{ user.username }}
        </a>

        <form action="{% url 'logout' %}" method="post" style="display:inline;">
            {% csrf_token %}
            <button type="submit" class="logout-btn"
                    style="background:none; border:none; cursor:pointer; font-family: inherit;">
                Выйти
            </button>
        </form>
        {% else %}
        <a href="{% url 'login' %}" style="color: white; text-decoration: none;">Войти</a>
        {% endif %}
    </div>
</header>

<main class="main-container">
    {% block content %}{% endblock %}
</main>

{% if user.is_authenticated %}
<script>
    (function () {
        const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;

        if (!timezone) {
            return;
        }

        fetch("{% url 'set_timezone' %}", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": "{{ csrf_token }}"
            },
            body: JSON.stringify({
                timezone: timezone
            })
        }).catch(function () {
            // Если timezone не отправился, страница всё равно должна работать.
        });
    })();
</script>
{% endif %}

</body>
</html>
