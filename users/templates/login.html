{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <link rel="icon" href="{% static 'images/favicon.ico' %}">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #2b5063, #417690);
            height: 100vh;
            overflow: hidden;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.98);
                filter: blur(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        .wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .login-card {
            width: 380px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(12px);
            padding: 34px;
            border-radius: 24px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.25);
            animation: fadeUp 0.6s ease;
        }

        .logo {
            text-align: center;
            font-size: 22px;
            font-weight: 900;
            margin-bottom: 6px;
            color: #2b5063;
            letter-spacing: 1px;
        }

        .title {
            text-align: center;
            font-size: 26px;
            font-weight: 900;
            margin-bottom: 24px;
        }

        .input-group {
            position: relative;
            margin-bottom: 16px;
        }

        input {
            width: 100%;
            padding: 13px 14px;
            border-radius: 14px;
            border: 1px solid #dce5eb;
            outline: none;
            font-size: 14px;
            transition: 0.2s;
        }

        input:focus {
            border-color: #417690;
            box-shadow: 0 0 0 3px rgba(65,118,144,0.15);
        }

        button {
            width: 100%;
            padding: 13px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(135deg, #417690, #2b5063);
            color: white;
            font-weight: 900;
            cursor: pointer;
            transition: 0.25s;
            margin-top: 6px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .error {
            background: #fdecea;
            color: #c62828;
            padding: 10px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 14px;
            font-weight: 700;
        }

        .footer {
            text-align: center;
            margin-top: 16px;
            font-size: 12px;
            color: #7a7a7a;
        }

    </style>
</head>

<body>

<div class="wrapper">
    <div class="login-card">

        <div class="logo">WAREHOUSE</div>
        <div class="title">Вход в систему</div>

        {% if form.errors %}
            <div class="error">
                Неверный логин или пароль
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="input-group">
                <input type="text" name="username" placeholder="Логин" required>
            </div>

            <div class="input-group">
                <input type="password" name="password" placeholder="Пароль" required>
            </div>

            <button type="submit">Войти</button>
        </form>

        <div class="footer">
            Secure Warehouse System
        </div>

    </div>
</div>

</body>
</html>
