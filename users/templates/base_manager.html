{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Дашборд менеджера{% endblock %}</title>
    <link rel="icon" href="{% static 'images/favicon.ico' %}">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f8f8f8;
            color: #333;
        }


        .sub-header {
            background: #79aec8;
            color: white;
            padding: 10px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .sub-header a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
        }

        .sub-header a:hover {
            text-decoration: underline;
        }

        .search-form {
            display: inline-block;
            margin-left: 20px;
        }

        .search-input {
            padding: 6px 10px;
            border: none;
            border-radius: 3px;
            font-size: 14px;
        }

        .search-btn {
            padding: 6px 10px;
            border: none;
            background: #2b5063;
            color: white;
            cursor: pointer;
            margin-left: 5px;
            border-radius: 3px;
        }

        .search-btn:hover {
            background: #1f3b4a;
        }

        .container {
            padding: 30px;
        }

        h1 {
            margin-top: 0;
            color: #666;
            font-size: 28px;
        }

        .module {
            background: white;
            border: 1px solid #ddd;
            margin-bottom: 25px;
        }

        .module h2 {
            margin: 0;
            padding: 12px 15px;
            background: #79aec8;
            color: white;
            font-size: 18px;
        }

        .module-content {
            padding: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        table th {
            text-align: left;
            background: #f5f5f5;
            padding: 12px;
            border-bottom: 1px solid #ddd;
            color: #666;
        }

        table td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        .action-link {
            color: #447e9b;
            text-decoration: none;
            font-weight: bold;
            margin-right: 10px;
        }

        .action-link:hover {
            text-decoration: underline;
        }

        .note {
            color: #777;
            font-size: 14px;
            margin-top: 10px;
        }

        .btn-save {
            background: #417690;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-save:hover {
            background: #2b5063;
        }

        .btn-add {
            display: inline-block;
            background: #417690;
            color: white;
            text-decoration: none;
            padding: 10px 16px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .btn-add:hover {
            background: #2b5063;
        }

        .form-row {
            margin-bottom: 15px;
        }

        .form-row label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #555;
        }

        .form-row input,
        .form-row select,
        .form-row textarea {
            width: 100%;
            max-width: 500px;
            padding: 10px;
            border: 1px solid #ccc;
            box-sizing: border-box;
            font-size: 14px;
        }


        /* header */
        .header {
            background: #417690;
            padding: 15px 30px;
            display: flex;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        /* бренд */
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* логотип */
        .logo-img {
            width: 34px;
            height: 34px;
            border-radius: 8px;

            padding: 4px;
            object-fit: cover;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.15);
            transition: 0.3s;
        }

        .logo-img:hover {
            transform: scale(1.1) rotate(5deg);
        }

        /* текст */
        .logo-text {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #ffffff, #dceeff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: 0.3s;
        }

        .logo-text:hover {
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

{% load static %}

<div class="header">
    <div class="brand">
        <img src="{% static 'images/favicon.ico' %}" class="logo-img">
        <div class="logo-text">Polad Tehno Manager</div>
    </div>
</div>

<div class="sub-header">
    <div>
        Добро пожаловать, <strong>{{ request.user.username }}</strong>
    </div>

    <div>
        <a href="{% url 'manager_dashboard' %}">Дашборд</a>
        <a href="{% url 'trading_list' %}">Сделки</a>
        {% if request.user.role == "admin" %}
            <a href="{% url 'admin_trading_history' %}">История</a>
        {% endif %}
        <a href="{% url 'warehouse_list' %}">Склады</a>
        <a href="{% url 'products:product_list' %}">Продукты</a>

        <!-- 🔍 ПОИСК -->
        <form method="get" action="{% url 'global_search' %}" class="search-form">
            <input type="text" name="q" placeholder="Поиск..." class="search-input">
            <button type="submit" class="search-btn">🔍</button>
        </form>

        <form method="post" action="{% url 'logout' %}" style="display:inline; margin-left:15px;">
            {% csrf_token %}
            <button type="submit" style="
                    background:none;
                    border:none;
                    padding:0;
                    margin:0;
                    color:white;
                    cursor:pointer;
                    font:inherit;
                ">
                Выйти
            </button>
        </form>
    </div>
</div>

<div class="container">
    {% block manager_content %}{% endblock %}
</div>

</body>
</html>
