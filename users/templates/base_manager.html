<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Дашборд менеджера{% endblock %}</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f8f8f8;
            color: #333;
        }

        .header {
            background: #417690;
            color: white;
            padding: 15px 30px;
            font-size: 24px;
            font-weight: bold;
        }

        .sub-header {
            background: #79aec8;
            color: white;
            padding: 10px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .sub-header a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
        }

        .sub-header a:hover {
            text-decoration: underline;
        }

        .nav {
            background: #e9f2f7;
            padding: 12px 30px;
            border-bottom: 1px solid #d5e3ec;
        }

        .nav a {
            color: #417690;
            text-decoration: none;
            font-weight: bold;
            margin-right: 20px;
        }

        .nav a:hover {
            text-decoration: underline;
        }

        .container {
            padding: 30px;
        }

        h1 {
            margin-top: 0;
            color: #666;
            font-size: 28px;
        }

        .module {
            background: white;
            border: 1px solid #ddd;
            margin-bottom: 25px;
        }

        .module h2 {
            margin: 0;
            padding: 12px 15px;
            background: #79aec8;
            color: white;
            font-size: 18px;
        }

        .module-content {
            padding: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        table th {
            text-align: left;
            background: #f5f5f5;
            padding: 12px;
            border-bottom: 1px solid #ddd;
            color: #666;
        }

        table td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        .action-link {
            color: #447e9b;
            text-decoration: none;
            font-weight: bold;
            margin-right: 10px;
        }

        .action-link:hover {
            text-decoration: underline;
        }

        .note {
            color: #777;
            font-size: 14px;
            margin-top: 10px;
        }

        .btn-save {
            background: #417690;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-save:hover {
            background: #2b5063;
        }

        .btn-add {
            display: inline-block;
            background: #417690;
            color: white;
            text-decoration: none;
            padding: 10px 16px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .btn-add:hover {
            background: #2b5063;
        }

        .form-row {
            margin-bottom: 15px;
        }

        .form-row label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #555;
        }

        .form-row input,
        .form-row select,
        .form-row textarea {
            width: 100%;
            max-width: 500px;
            padding: 10px;
            border: 1px solid #ccc;
            box-sizing: border-box;
            font-size: 14px;
        }

        .errorlist {
            color: #b94a48;
            margin: 5px 0 0;
            padding-left: 18px;
        }
    </style>
</head>
<body>

    <div class="header">
        Warehouse Manager
    </div>

    <div class="sub-header">
        <div>
            Добро пожаловать, <strong>{{ request.user.username }}</strong>
        </div>
        <div>
            <a href="{% url 'manager_dashboard' %}">Дашборд</a>
            <a href="{% url 'product_list' %}"></a>
            <a href="{% url 'trading_list' %}">Trading</a>
            <form method="post" action="{% url 'logout' %}" style="display:inline;">
    {% csrf_token %}
    <button type="submit" style="
        background:none;
        border:none;
        padding:0;
        margin:0;
        color:#0d6efd;
        cursor:pointer;
        font:inherit;
        text-decoration:underline;
    ">
        Выйти
    </button>
</form>
        </div>
    </div>

    <div class="container">
        {% block manager_content %}{% endblock %}
    </div>

</body>
</html>
